x-common-env: &common-env
  DATABASE_URL: postgresql://${POSTGRES_USER:-dp_user}:${POSTGRES_PASSWORD:-dp_pass}@postgres:5432/${POSTGRES_DB:-data_platform}
  REDIS_URL: redis://redis:6379/0
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:-default-dev-key}
  API_KEY: ${API_KEY:-default-dev-key}

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-data_platform}
      POSTGRES_USER: ${POSTGRES_USER:-dp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dp_pass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dp_user} -d ${POSTGRES_DB:-data_platform}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env

  celery-worker:
    build: .
    command: celery -A src.core.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env

  celery-beat:
    build: .
    command: >
      celery -A src.core.celery_app beat
      --scheduler src.tasks.scheduler:DatabaseScheduler
      --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env

volumes:
  pgdata:
